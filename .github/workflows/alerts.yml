name: Coverage alerts

on:
  schedule:
    # every 15 min, 00:00-08:45 UTC  (~08:00-16:45 Hong Kong time), Mon-Fri.
    # NOTE: GitHub cron is best-effort and can be delayed several minutes under load.
    - cron: "*/15 0-8 * * 1-5"
  workflow_dispatch:        # adds a manual "Run workflow" button (also used for --seed)
    inputs:
      mode:
        description: "live or seed"
        default: "live"
        required: false

permissions:
  contents: write           # so the job can commit the de-dupe state back

concurrency:
  group: coverage-alerts
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run alerts
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python alerts.py ${{ github.event.inputs.mode == 'seed' && '--seed' || '' }}
      - name: Persist de-dupe state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts_state.json
          git diff --staged --quiet || git commit -m "alerts: update state"
          git push || echo "nothing to push"
