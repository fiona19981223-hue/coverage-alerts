name: Coverage alerts

on:
  schedule:
    # every 15 min, 24/7 — catches outsized moves across every market our book spans
    # (HK/JP/CN/KR/TW/SEA closes + US-listed ADRs that trade overnight HKT).
    # De-dupe in alerts.py = one alert per move, so off-hours/weekend runs are harmless.
    # NOTE: GitHub cron is best-effort and can be delayed/dropped under load.
    - cron: "*/15 * * * *"
  workflow_dispatch:        # adds a manual "Run workflow" button (also used for --seed)
    inputs:
      mode:
        description: "live, seed, or test"
        default: "live"
        required: false

permissions:
  contents: write           # so the job can commit the de-dupe state back

concurrency:
  group: coverage-alerts
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install yfinance pandas   # alerts.py only needs these (dashboard deps live in requirements.txt)
      - name: Run alerts
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ "$MODE" = "seed" ]; then python alerts.py --seed
          elif [ "$MODE" = "test" ]; then python alerts.py --test
          else python alerts.py
          fi
      - name: Persist de-dupe state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts_state.json
          git diff --staged --quiet || git commit -m "alerts: update state"
          git push || echo "nothing to push"
